name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: mvn test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Validate local compose config
        run: docker compose --env-file /dev/null config

      - name: Validate production compose config
        env:
          POSTGRES_USER: nexora_app
          POSTGRES_PASSWORD: ci_production_config_only_password
          JWT_SECRET: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
          CORS_ALLOWED_ORIGINS: https://app.example.com
        run: docker compose --env-file /dev/null -f docker-compose.yml -f docker-compose.prod.yml config

      - name: Build Docker images
        run: docker compose build
