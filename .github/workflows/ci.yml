name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: mvn test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install chromium

      - name: Run frontend smoke tests
        working-directory: frontend
        run: npm run smoke

      - name: Validate local compose config
        run: docker compose --env-file /dev/null config

      - name: Validate production compose config
        env:
          POSTGRES_USER: nexora_app
          POSTGRES_PASSWORD: ci_production_config_only_password
          JWT_SECRET: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
          CORS_ALLOWED_ORIGINS: https://app.example.com
          APP_FRONTEND_BASE_URL: https://app.example.com
          APP_EMAIL_MODE: smtp
          APP_EMAIL_FROM: Wasilio <no-reply@example.com>
          APP_SUPPORT_CONTACT: support@example.com
          APP_MEDIA_PUBLIC_BASE_URL: https://app.example.com
          SMTP_HOST: smtp.example.com
          SMTP_PORT: '587'
          SMTP_USERNAME: ci-smtp-user
          SMTP_PASSWORD: ci-smtp-password
          APP_ONBOARDING_ENABLED: 'false'
          VITE_API_BASE_URL: https://app.example.com/api
          VITE_LANDING_ENGINE_URL: https://landing.example.com
          VITE_PUBLIC_SITE_URL: https://app.example.com
          VITE_PUBLIC_SUPPORT_EMAIL: support@example.com
        run: docker compose --env-file /dev/null -f docker-compose.yml -f docker-compose.prod.yml config

      - name: Build Docker images
        run: docker compose build
