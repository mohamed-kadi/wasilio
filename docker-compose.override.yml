services:
  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexora}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  backend:
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nexora}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration,classpath:db/seed
      SPRING_FLYWAY_OUT_OF_ORDER: ${SPRING_FLYWAY_OUT_OF_ORDER:-true}
      JWT_SECRET: ${JWT_SECRET:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:-http://localhost}
      APP_EMAIL_MODE: ${APP_EMAIL_MODE:-log}
      APP_EMAIL_FROM: ${APP_EMAIL_FROM:-Wasilio <no-reply@wasilio.local>}
      APP_SUPPORT_CONTACT: ${APP_SUPPORT_CONTACT:-support@wasilio.local}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-false}
      SMTP_STARTTLS_ENABLE: ${SMTP_STARTTLS_ENABLE:-false}
      APP_ONBOARDING_ENABLED: ${APP_ONBOARDING_ENABLED:-true}
      APP_PASSWORD_RESET_TOKEN_TTL: ${APP_PASSWORD_RESET_TOKEN_TTL:-PT30M}
      APP_SUPER_ADMIN_BOOTSTRAP_ENABLED: ${APP_SUPER_ADMIN_BOOTSTRAP_ENABLED:-false}
      APP_SUPER_ADMIN_EMAIL: ${APP_SUPER_ADMIN_EMAIL:-}
      APP_SUPER_ADMIN_PASSWORD: ${APP_SUPER_ADMIN_PASSWORD:-}
      APP_SUPER_ADMIN_TENANT_NAME: ${APP_SUPER_ADMIN_TENANT_NAME:-Wasilio Internal}
      APP_SECURITY_THROTTLING_ENABLED: ${APP_SECURITY_THROTTLING_ENABLED:-true}
      APP_LOGIN_THROTTLE_MAX_ATTEMPTS: ${APP_LOGIN_THROTTLE_MAX_ATTEMPTS:-5}
      APP_LOGIN_THROTTLE_WINDOW: ${APP_LOGIN_THROTTLE_WINDOW:-PT10M}
      APP_LOGIN_THROTTLE_LOCKOUT: ${APP_LOGIN_THROTTLE_LOCKOUT:-PT15M}
      APP_ONBOARDING_THROTTLE_MAX_ATTEMPTS: ${APP_ONBOARDING_THROTTLE_MAX_ATTEMPTS:-3}
      APP_ONBOARDING_THROTTLE_WINDOW: ${APP_ONBOARDING_THROTTLE_WINDOW:-PT1H}
      APP_ONBOARDING_THROTTLE_LOCKOUT: ${APP_ONBOARDING_THROTTLE_LOCKOUT:-PT1H}
      APP_PASSWORD_RESET_THROTTLE_MAX_ATTEMPTS: ${APP_PASSWORD_RESET_THROTTLE_MAX_ATTEMPTS:-3}
      APP_PASSWORD_RESET_THROTTLE_WINDOW: ${APP_PASSWORD_RESET_THROTTLE_WINDOW:-PT1H}
      APP_PASSWORD_RESET_THROTTLE_LOCKOUT: ${APP_PASSWORD_RESET_THROTTLE_LOCKOUT:-PT1H}
