spring:
  application:
    name: backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nexora}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:false}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  email:
    mode: ${APP_EMAIL_MODE:log}
    from: ${APP_EMAIL_FROM:Wasilio <no-reply@wasilio.local>}
    support-contact: ${APP_SUPPORT_CONTACT:support@wasilio.local}
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost}
  onboarding:
    enabled: ${APP_ONBOARDING_ENABLED:false}
  password-reset:
    token-ttl: ${APP_PASSWORD_RESET_TOKEN_TTL:PT30M}
  super-admin:
    bootstrap:
      enabled: ${APP_SUPER_ADMIN_BOOTSTRAP_ENABLED:false}
      email: ${APP_SUPER_ADMIN_EMAIL:}
      password: ${APP_SUPER_ADMIN_PASSWORD:}
      tenant-name: ${APP_SUPER_ADMIN_TENANT_NAME:Wasilio Internal}
  security:
    throttling:
      enabled: ${APP_SECURITY_THROTTLING_ENABLED:true}
      login:
        max-attempts: ${APP_LOGIN_THROTTLE_MAX_ATTEMPTS:5}
        window: ${APP_LOGIN_THROTTLE_WINDOW:PT10M}
        lockout: ${APP_LOGIN_THROTTLE_LOCKOUT:PT15M}
      onboarding:
        max-attempts: ${APP_ONBOARDING_THROTTLE_MAX_ATTEMPTS:3}
        window: ${APP_ONBOARDING_THROTTLE_WINDOW:PT1H}
        lockout: ${APP_ONBOARDING_THROTTLE_LOCKOUT:PT1H}
      password-reset:
        max-attempts: ${APP_PASSWORD_RESET_THROTTLE_MAX_ATTEMPTS:3}
        window: ${APP_PASSWORD_RESET_THROTTLE_WINDOW:PT1H}
        lockout: ${APP_PASSWORD_RESET_THROTTLE_LOCKOUT:PT1H}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  projections:
    rebuild-orders-on-startup: ${APP_PROJECTIONS_REBUILD_ORDERS_ON_STARTUP:false}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level logger=%logger{36} correlationId=%X{correlationId} tenantId=%X{tenantId} message=%msg%n%ex"
