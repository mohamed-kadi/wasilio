services:
  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexora}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set for production compose}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set for production compose}

  backend:
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nexora}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:?POSTGRES_USER must be set for production compose}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set for production compose}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set for production compose}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS must be set for production compose}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:?APP_FRONTEND_BASE_URL must be set for production compose}
      APP_EMAIL_MODE: ${APP_EMAIL_MODE:?APP_EMAIL_MODE must be set for production compose}
      APP_EMAIL_FROM: ${APP_EMAIL_FROM:?APP_EMAIL_FROM must be set for production compose}
      APP_SUPPORT_CONTACT: ${APP_SUPPORT_CONTACT:?APP_SUPPORT_CONTACT must be set for production compose}
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST must be set for production compose}
      SMTP_PORT: ${SMTP_PORT:?SMTP_PORT must be set for production compose}
      SMTP_USERNAME: ${SMTP_USERNAME:?SMTP_USERNAME must be set for production compose}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?SMTP_PASSWORD must be set for production compose}
      SMTP_AUTH: ${SMTP_AUTH:-true}
      SMTP_STARTTLS_ENABLE: ${SMTP_STARTTLS_ENABLE:-true}
      APP_ONBOARDING_ENABLED: ${APP_ONBOARDING_ENABLED:?APP_ONBOARDING_ENABLED must be set for production compose}
      APP_PASSWORD_RESET_TOKEN_TTL: ${APP_PASSWORD_RESET_TOKEN_TTL:-PT30M}
      APP_SUPER_ADMIN_BOOTSTRAP_ENABLED: ${APP_SUPER_ADMIN_BOOTSTRAP_ENABLED:-false}
      APP_SUPER_ADMIN_EMAIL: ${APP_SUPER_ADMIN_EMAIL:-}
      APP_SUPER_ADMIN_PASSWORD: ${APP_SUPER_ADMIN_PASSWORD:-}
      APP_SUPER_ADMIN_TENANT_NAME: ${APP_SUPER_ADMIN_TENANT_NAME:-Nexora Internal}
      APP_SECURITY_THROTTLING_ENABLED: ${APP_SECURITY_THROTTLING_ENABLED:-true}
      APP_LOGIN_THROTTLE_MAX_ATTEMPTS: ${APP_LOGIN_THROTTLE_MAX_ATTEMPTS:-5}
      APP_LOGIN_THROTTLE_WINDOW: ${APP_LOGIN_THROTTLE_WINDOW:-PT10M}
      APP_LOGIN_THROTTLE_LOCKOUT: ${APP_LOGIN_THROTTLE_LOCKOUT:-PT15M}
      APP_ONBOARDING_THROTTLE_MAX_ATTEMPTS: ${APP_ONBOARDING_THROTTLE_MAX_ATTEMPTS:-3}
      APP_ONBOARDING_THROTTLE_WINDOW: ${APP_ONBOARDING_THROTTLE_WINDOW:-PT1H}
      APP_ONBOARDING_THROTTLE_LOCKOUT: ${APP_ONBOARDING_THROTTLE_LOCKOUT:-PT1H}
      APP_PASSWORD_RESET_THROTTLE_MAX_ATTEMPTS: ${APP_PASSWORD_RESET_THROTTLE_MAX_ATTEMPTS:-3}
      APP_PASSWORD_RESET_THROTTLE_WINDOW: ${APP_PASSWORD_RESET_THROTTLE_WINDOW:-PT1H}
      APP_PASSWORD_RESET_THROTTLE_LOCKOUT: ${APP_PASSWORD_RESET_THROTTLE_LOCKOUT:-PT1H}

  frontend:
    build:
      args:
        VITE_PUBLIC_SITE_URL: ${VITE_PUBLIC_SITE_URL:?VITE_PUBLIC_SITE_URL must be set for production compose}
        VITE_PUBLIC_SUPPORT_EMAIL: ${VITE_PUBLIC_SUPPORT_EMAIL:?VITE_PUBLIC_SUPPORT_EMAIL must be set for production compose}
        VITE_PUBLIC_WHATSAPP_URL: ${VITE_PUBLIC_WHATSAPP_URL:-}
        VITE_PUBLIC_META_PIXEL_ID: ${VITE_PUBLIC_META_PIXEL_ID:-}
