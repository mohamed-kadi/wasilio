services:
  postgres:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_PUBLIC_SITE_URL: ${VITE_PUBLIC_SITE_URL:-http://localhost}
        VITE_PUBLIC_SUPPORT_EMAIL: ${VITE_PUBLIC_SUPPORT_EMAIL:-support@wasilio.local}
        VITE_PUBLIC_WHATSAPP_URL: ${VITE_PUBLIC_WHATSAPP_URL:-}
        VITE_PUBLIC_META_PIXEL_ID: ${VITE_PUBLIC_META_PIXEL_ID:-}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
